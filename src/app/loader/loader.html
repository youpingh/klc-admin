<h2>Database Loader</h2>

<div class="buttons">
    <!-- <button class="btn" (click)="runAll()" [disabled]="running">
        Load ALL Data
    </button> -->

    <button class="btn btn-primary mr-3" (click)="uploadWords()" [disabled]="running">
        Load Words
    </button>

    <button class="btn btn-primary mr-3" (click)="uploadImages()" [disabled]="running">
        Load Greeting Images
    </button>

    <button class="btn btn-primary mr-3" (click)="uploadCategories()" [disabled]="running">
        Load Categories
    </button>

    <button class="btn btn-primary" (click)="uploadUsers()" [disabled]="running">
        Load Users
    </button>
    
    <p class="msg">
        Make sure the JSON files in assets/data folder are ready to upload before running the loader.
    </p>
</div>

<div class="log">
    <div *ngFor="let line of logs">{{ line }}</div>
</div>
